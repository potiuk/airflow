---
default_stages: [commit, push]
default_language_version:
  python: python3
  node: 18.6.0
minimum_prek_version: '0.3.5'
repos:
  - repo: meta
    hooks:
      - id: identity
        name: Print input to the static check hooks for troubleshooting
      - id: check-hooks-apply
        name: Check if all hooks apply to the repository
  - repo: https://github.com/thlorenz/doctoc.git
    rev: v2.2.0
    hooks:
      - id: doctoc
        name: Add TOC for Markdown and RST files
        files: ^.+\.(md|rst)$
        # Skip agent-facing skill definitions: their YAML frontmatter must be
        # the first thing in the file, which is incompatible with doctoc
        # inserting a TOC block at the top.
        exclude: ^\.claude/skills/.*$
        args:
          - "--maxlevel"
          - "2"
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-merge-conflict
        name: Check that merge conflicts are not being committed
      - id: detect-private-key
        name: Detect if private key is added to the repository
      - id: end-of-file-fixer
        name: Make sure that there is an empty line at the end
      - id: mixed-line-ending
        name: Detect if mixed line ending is used (\r vs. \r\n)
      - id: trailing-whitespace
        name: Remove trailing whitespace at end of line
  # Project-local checks for the `generate-cve-json` Python project.
  # Each hook sets the working directory via `uv run --directory` so
  # ruff / mypy / pytest pick up config from the project's
  # pyproject.toml without explicit paths. The `files:` pattern scopes
  # each hook to changes inside the project dir.
  - repo: local
    hooks:
      - id: generate-cve-json-ruff-check
        name: ruff check (generate-cve-json)
        language: system
        entry: uv run --directory .claude/skills/generate-cve-json ruff check
        files: ^\.claude/skills/generate-cve-json/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: generate-cve-json-ruff-format
        name: ruff format (generate-cve-json)
        language: system
        entry: uv run --directory .claude/skills/generate-cve-json ruff format --check
        files: ^\.claude/skills/generate-cve-json/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: generate-cve-json-mypy
        name: mypy (generate-cve-json)
        language: system
        entry: uv run --directory .claude/skills/generate-cve-json mypy
        files: ^\.claude/skills/generate-cve-json/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: generate-cve-json-pytest
        name: pytest (generate-cve-json)
        language: system
        entry: uv run --directory .claude/skills/generate-cve-json pytest
        files: ^\.claude/skills/generate-cve-json/(src|tests|pyproject\.toml)
        pass_filenames: false
