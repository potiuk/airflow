---
default_stages: [commit, push]
default_language_version:
  python: python3
  node: 18.6.0
minimum_prek_version: '0.3.5'
repos:
  - repo: meta
    hooks:
      - id: identity
        name: Print input to the static check hooks for troubleshooting
      - id: check-hooks-apply
        name: Check if all hooks apply to the repository
  - repo: https://github.com/thlorenz/doctoc.git
    rev: v2.2.0
    hooks:
      - id: doctoc
        name: Add TOC for Markdown and RST files
        files: ^.+\.(md|rst)$
        # Skip agent-facing skill definitions: their YAML frontmatter must be
        # the first thing in the file, which is incompatible with doctoc
        # inserting a TOC block at the top.
        exclude: ^(\.claude/skills/.*|tools/vulnogram/generate-cve-json/SKILL\.md)$
        args:
          - "--maxlevel"
          - "3"
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-merge-conflict
        name: Check that merge conflicts are not being committed
      - id: detect-private-key
        name: Detect if private key is added to the repository
      - id: end-of-file-fixer
        name: Make sure that there is an empty line at the end
      - id: mixed-line-ending
        name: Detect if mixed line ending is used (\r vs. \r\n)
      - id: trailing-whitespace
        name: Remove trailing whitespace at end of line
  # Belt-and-braces check that the per-user configuration file never
  # lands on airflow-s — .gitignore already excludes it, but this hook
  # catches a stray `git add -f config/user.md` before it reaches the
  # remote. See config/README.md for the config layer explainer.
  - repo: local
    hooks:
      - id: forbid-user-config
        name: Refuse commits that stage config/user.md
        language: system
        entry: |
          bash -c '
            if git diff --cached --name-only | grep -Fxq config/user.md; then
              echo "✗ config/user.md is a per-user file and must never be committed."
              echo "  Unstage it with: git restore --staged config/user.md"
              echo "  See config/README.md for the per-user configuration layer."
              exit 1
            fi
          '
        pass_filenames: false
        always_run: true
  # Project-local checks for the `generate-cve-json` Python project,
  # which lives under `tools/vulnogram/` as the Vulnogram tool adapter's
  # CVE-5.x JSON generator. Each hook sets the working directory via
  # `uv run --directory` so ruff / mypy / pytest pick up config from the
  # project's pyproject.toml without explicit paths. The `files:`
  # pattern scopes each hook to changes inside the project dir.
  - repo: local
    hooks:
      - id: generate-cve-json-ruff-check
        name: ruff check (generate-cve-json)
        language: system
        entry: uv run --directory tools/vulnogram/generate-cve-json ruff check
        files: ^tools/vulnogram/generate-cve-json/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: generate-cve-json-ruff-format
        name: ruff format (generate-cve-json)
        language: system
        entry: uv run --directory tools/vulnogram/generate-cve-json ruff format --check
        files: ^tools/vulnogram/generate-cve-json/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: generate-cve-json-mypy
        name: mypy (generate-cve-json)
        language: system
        entry: uv run --directory tools/vulnogram/generate-cve-json mypy
        files: ^tools/vulnogram/generate-cve-json/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: generate-cve-json-pytest
        name: pytest (generate-cve-json)
        language: system
        entry: uv run --directory tools/vulnogram/generate-cve-json pytest
        files: ^tools/vulnogram/generate-cve-json/(src|tests|pyproject\.toml)
        pass_filenames: false
