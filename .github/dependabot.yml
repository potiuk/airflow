---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # 7-day cooldown so a just-released action tag has a chance to
    # settle (retags, withdrawal, CI incidents on the upstream) before
    # Dependabot proposes bumping to it.
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      pre-commit-hooks:
        patterns:
          - "*"

  # uv lock for the generate-cve-json Python project. Dependabot reads
  # pyproject.toml + uv.lock and opens PRs that update pinned versions.
  # Runtime deps are empty today (stdlib-only); the dev group (ruff,
  # mypy, pytest) is what this ecosystem actually tracks.
  - package-ecosystem: "uv"
    directory: "/.claude/skills/generate-cve-json"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      generate-cve-json-deps:
        patterns:
          - "*"
