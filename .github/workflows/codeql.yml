---
name: "CodeQL"

on:  # yamllint disable-line rule:truthy
  push:
    branches: [airflow-s]
  pull_request:
    branches: [airflow-s]
  schedule:
    # Run weekly on Sunday at 07:13 UTC. Off-peak hour chosen so the job
    # doesn't collide with Monday-morning CI surges.
    - cron: "13 7 * * 0"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-24.04
    permissions:
      # Writing security-events is required for CodeQL to upload results to
      # the repository's "Security" tab. The rest stay read-only.
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@865f5f5c36632f18690a3d569fa0a764f2da0c3e  # v3
        with:
          languages: python
          # The only hand-written Python in this repo is the
          # `generate-cve-json` project under `.claude/skills/`. Keep the
          # default queries; we don't need security-extended here because
          # the code is stdlib-only and does not process untrusted
          # network input at runtime.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@865f5f5c36632f18690a3d569fa0a764f2da0c3e  # v3
        with:
          category: "/language:python"
