---
name: "Synchronize main from apache/airflow"
on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
  schedule:
    # sync repos every fifteen minutes
    - cron: '0,15,30,45 * * * *'
permissions:
  contents: write
jobs:
  synchronize-repo:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout main from apache/airflow"
        uses: actions/checkout@v3
        with:
            repository: apache/airflow
            ref: main
            path: airflow
            # with 0 it fetches all the tags and branches we don't need
            # we only need enough to push the missing commits that we don't have since last sync
            fetch-depth: 300
            persist-credentials: false
      - name: "Push to local main"
        uses: ad-m/github-push-action@df39337088a4cf2782a73f221bbd33f90e3e091d
        with:
          branch: "main"
          directory: "airflow"
          force: true
          tags: false
concurrency:
  group: "sync-main"
  cancel-in-progress: true
