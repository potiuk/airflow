---
# ARM canary workflow. Runs the full CI pipeline (defined in `_ci-pipeline.yml`)
# on ARM runners as the scheduled canary. The same pipeline runs on AMD via
# `ci-amd.yml` for pull-request and push events; the two are independent
# workflows so neither blocks the other and badges/notifications track them
# separately.
#
# Today this is the only ARM trigger surface — there is no `pull_request:` or
# `push:` here on purpose. ARM runners are reserved for the canary slot until
# we decide to broaden the scope.
name: Tests (ARM)
on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: '28 1,3,7,9,13,15,19,21 * * *'
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: ci-arm-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    name: "ARM"
    uses: ./.github/workflows/_ci-pipeline.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      platform: "linux/arm64"
      runner-type: '["ubuntu-22.04-arm"]'
    secrets:
      # Forward only the secrets the reusable pipeline actually consumes;
      # `secrets: inherit` would pass everything in the org/repo store.
      DOCS_AWS_ACCESS_KEY_ID: ${{ secrets.DOCS_AWS_ACCESS_KEY_ID }}
      DOCS_AWS_SECRET_ACCESS_KEY: ${{ secrets.DOCS_AWS_SECRET_ACCESS_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
